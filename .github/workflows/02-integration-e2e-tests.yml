name: 🧪 Integration & E2E Tests
on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────────────────────
  # BACKEND INTEGRATION TESTS
  # ─────────────────────────────────────────────────────────────
  backend-integration:
    name: 🔗 Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: integration_user
          POSTGRES_PASSWORD: integration_password
          POSTGRES_DB: airline_booking_integration
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm ci

      - name: 🗄️ Setup test database
        env:
          DATABASE_URL: postgresql://integration_user:integration_password@localhost:5432/airline_booking_integration
        run: |
          cd backend
          npm run typeorm migration:run

      - name: 🧪 Run integration tests
        env:
          DATABASE_URL: postgresql://integration_user:integration_password@localhost:5432/airline_booking_integration
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          NODE_ENV: test
        run: |
          cd backend
          npm run test:integration -- --coverage

      - name: 📊 Upload integration test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend-integration
          name: backend-integration-coverage
        if: always()

      - name: 📝 Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-report
          path: backend/test-results-integration.xml

  # ─────────────────────────────────────────────────────────────
  # FRONTEND E2E TESTS (Cypress)
  # ─────────────────────────────────────────────────────────────
  frontend-e2e:
    name: 🎯 Frontend E2E Tests (Cypress)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: e2e_user
          POSTGRES_PASSWORD: e2e_password
          POSTGRES_DB: airline_booking_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: 🗄️ Setup E2E database
        env:
          DATABASE_URL: postgresql://e2e_user:e2e_password@localhost:5432/airline_booking_e2e
        run: |
          cd backend
          npm run typeorm migration:run

      - name: 🚀 Start backend server
        env:
          DATABASE_URL: postgresql://e2e_user:e2e_password@localhost:5432/airline_booking_e2e
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: |
          cd backend
          npm start &
          sleep 10

      - name: 🚀 Start frontend dev server
        run: |
          cd frontend
          npm run dev &
          sleep 10

      - name: 🎯 Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome
          headed: false
          spec: cypress/e2e/**/*.cy.ts

      - name: 📸 Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

      - name: 🎥 Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: frontend/cypress/videos

  # ─────────────────────────────────────────────────────────────
  # LOAD TESTING (k6)
  # ─────────────────────────────────────────────────────────────
  load-testing:
    name: 📈 Load Testing (k6)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: load_user
          POSTGRES_PASSWORD: load_password
          POSTGRES_DB: airline_booking_load
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: 🗄️ Setup load test database
        env:
          DATABASE_URL: postgresql://load_user:load_password@localhost:5432/airline_booking_load
        run: |
          cd backend
          npm run typeorm migration:run

      - name: 🚀 Start backend server
        env:
          DATABASE_URL: postgresql://load_user:load_password@localhost:5432/airline_booking_load
          REDIS_URL: redis://localhost:6379
          NODE_ENV: production
        run: |
          cd backend
          npm start &
          sleep 10

      - name: 📦 Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A+D3718D716EB7F3A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: 📈 Run k6 load tests
        run: |
          k6 run tests/load-testing/flight-search-load-test.js --vus 100 --duration 1m

      - name: 📝 Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-results
          path: tests/load-testing/results/

  # ─────────────────────────────────────────────────────────────
  # API SCHEMA VALIDATION
  # ─────────────────────────────────────────────────────────────
  api-validation:
    name: 🔍 API Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: ✅ Validate OpenAPI schema
        run: |
          cd backend
          npm run schema:validate

  # ─────────────────────────────────────────────────────────────
  # SUMMARY
  # ─────────────────────────────────────────────────────────────
  integration-e2e-summary:
    name: ✨ Integration & E2E Summary
    runs-on: ubuntu-latest
    needs: [backend-integration, frontend-e2e, load-testing, api-validation]
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🎯 Integration & E2E Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "### Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Integration: ${{ needs.backend-integration.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend E2E: ${{ needs.frontend-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Load Testing: ${{ needs.load-testing.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Validation: ${{ needs.api-validation.result }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if tests failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
