name: 🌍 Deploy Production

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - production-canary

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deployment-checks:
    name: ✅ Pre-Deployment Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release-notes: ${{ steps.release.outputs.notes }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Extract version
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying version: ${VERSION}"

      - name: 📋 Get release notes
        id: release
        run: |
          NOTES=$(git log --format=%B -n 1 ${{ github.ref }})
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: ✅ Verify Git tag
        run: |
          git verify-tag ${{ github.ref }} || exit 1

      - name: ✅ Verify version format
        run: |
          VERSION=${{ github.ref_name }}
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

  security-approval:
    name: 🔐 Security Approval
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    environment: production-approval
    steps:
      - name: 📝 Request approval
        run: |
          echo "Production deployment requires security approval"
          echo "Version: ${{ needs.pre-deployment-checks.outputs.version }}"

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, security-approval]
    environment:
      name: production
      url: https://api.airline-booking.com
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: 🔧 Configure AWS credentials (Primary)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-prod-deployment

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: 📝 Extract image metadata
        id: meta
        run: |
          VERSION=${{ needs.pre-deployment-checks.outputs.version }}
          echo "backend-image=${{ steps.login-ecr.outputs.registry }}/airline-booking/backend:${VERSION}" >> $GITHUB_OUTPUT
          echo "frontend-image=${{ steps.login-ecr.outputs.registry }}/airline-booking/frontend:${VERSION}" >> $GITHUB_OUTPUT

      - name: 🐳 Update backend ECS task definition
        id: update-backend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ./infrastructure/ecs/task-definitions/backend-prod-task.json
          container-name: airline-booking-backend
          image: ${{ steps.meta.outputs.backend-image }}
          environment-variables: |
            LOG_LEVEL=info
            NODE_ENV=production
            SENTRY_ENVIRONMENT=production

      - name: 🚀 Deploy backend to Production ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-backend-task.outputs.task-definition }}
          service: airline-booking-backend-prod
          cluster: airline-booking-prod
          wait-for-service-stability: true

      - name: 🐳 Update frontend ECS task definition
        id: update-frontend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ./infrastructure/ecs/task-definitions/frontend-prod-task.json
          container-name: airline-booking-frontend
          image: ${{ steps.meta.outputs.frontend-image }}

      - name: 🚀 Deploy frontend to Production ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-frontend-task.outputs.task-definition }}
          service: airline-booking-frontend-prod
          cluster: airline-booking-prod
          wait-for-service-stability: true

      - name: 🗄️ Run database migrations
        run: |
          ./infrastructure/scripts/run-migrations.sh production

      - name: 🔄 Verify production deployment
        run: |
          echo "Verifying backend health check..."
          for i in {1..30}; do
            curl -f https://api.airline-booking.com/health && break
            if [ $i -eq 30 ]; then exit 1; fi
            sleep 10
          done
          
          echo "Verifying frontend health check..."
          curl -f https://airline-booking.com/ || exit 1

      - name: 📊 Monitor deployment metrics
        run: |
          echo "Checking CloudWatch metrics..."
          aws cloudwatch get-metric-statistics \
            --namespace AWS/ECS \
            --metric-name CPUUtilization \
            --dimensions Name=ServiceName,Value=airline-booking-backend-prod \
            --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Average

      - name: 📢 Notify deployment success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL_PROD }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ Production deployment successful",
              "blocks": [{
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 Production Deployment Successful",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [{
                  "type": "mrkdwn",
                  "text": "*Version:*\n${{ needs.pre-deployment-checks.outputs.version }}"
                },
                {
                  "type": "mrkdwn",
                  "text": "*Author:*\n${{ github.actor }}"
                }]
              }]
            }'

      - name: 📤 Update GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.pre-deployment-checks.outputs.version }}
          body: ${{ needs.pre-deployment-checks.outputs.release-notes }}
          draft: false
          prerelease: false

  post-deployment-tests:
    name: 🧪 Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-production]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm ci --prefix ./tests/e2e

      - name: 🧪 Run end-to-end tests
        env:
          API_URL: https://api.airline-booking.com
          WEB_URL: https://airline-booking.com
        run: |
          npm run test:e2e --prefix ./tests/e2e

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ./tests/e2e/results/

  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-production]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install k6

      - name: ⚡ Run performance tests
        env:
          API_URL: https://api.airline-booking.com
        run: |
          k6 run ./tests/performance/flight-search.js --vus 100 --duration 5m

      - name: 📊 Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: ./tests/performance/results/

  monitoring-setup:
    name: 📊 Setup Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: 📊 Update CloudWatch alarms
        run: |
          echo "Configuring CloudWatch alarms for production..."
          ./infrastructure/scripts/setup-alarms.sh production

      - name: 📈 Enable detailed monitoring
        run: |
          echo "Enabling detailed monitoring..."
          aws ecs update-service \
            --cluster airline-booking-prod \
            --service airline-booking-backend-prod \
            --enable-ecs-managed-tags

  rollback-production:
    name: 🔄 Rollback Production
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deployment-tests, performance-tests]
    if: failure()
    environment: production-approval
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: 🔄 Rollback to previous version
        run: |
          echo "Rolling back production to previous version..."
          aws ecs update-service \
            --cluster airline-booking-prod \
            --service airline-booking-backend-prod \
            --force-new-deployment

          aws ecs update-service \
            --cluster airline-booking-prod \
            --service airline-booking-frontend-prod \
            --force-new-deployment

      - name: 📢 Notify production rollback
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL_PROD }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🚨 CRITICAL: Production deployment rolled back",
              "blocks": [{
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚨 Production Rollback",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Status:* ROLLED BACK\n*Version:* ${{ github.ref_name }}\n*Reason:* Post-deployment tests failed"
                }
              }]
            }'

  deployment-summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-production]
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.pre-deployment-checks.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
