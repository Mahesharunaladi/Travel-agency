name: 🚀 Deploy to Production
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────────────────────
  # DEPLOY TO STAGING
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.airlinebooking.com
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    permissions:
      contents: read
      packages: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📝 Create deployment config
        run: |
          cat > deploy-config.json << EOF
          {
            "backend": {
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:develop",
              "port": 3001,
              "replicas": 2,
              "env": {
                "NODE_ENV": "staging",
                "DB_HOST": "${{ secrets.STAGING_DB_HOST }}",
                "REDIS_HOST": "${{ secrets.STAGING_REDIS_HOST }}"
              }
            },
            "frontend": {
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:develop",
              "port": 3000,
              "replicas": 2
            }
          }
          EOF

      - name: 🚀 Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster airline-booking-staging \
            --service backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          aws ecs update-service \
            --cluster airline-booking-staging \
            --service frontend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: ✅ Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster airline-booking-staging \
            --services backend-service frontend-service \
            --region ${{ env.AWS_REGION }}

      - name: 🔍 Health check
        run: |
          for i in {1..30}; do
            if curl -f https://staging-api.airlinebooking.com/api/v1/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting for service to be healthy... ($i/30)"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: 📢 Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Deployment to Staging Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Successful*\n*Environment:* Staging\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────────────────────
  # DEPLOY TO PRODUCTION
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.airlinebooking.com
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [deploy-staging]
    permissions:
      contents: read
      packages: read
      deployments: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📊 Create deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            });
            return deployment.data.id;

      - name: 🚀 Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster airline-booking-production \
            --service backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          aws ecs update-service \
            --cluster airline-booking-production \
            --service frontend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: ✅ Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster airline-booking-production \
            --services backend-service frontend-service \
            --region ${{ env.AWS_REGION }}

      - name: 🔍 Health check
        run: |
          for i in {1..60}; do
            if curl -f https://api.airlinebooking.com/api/v1/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting for service to be healthy... ($i/60)"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: 📈 Trigger monitoring
        run: |
          curl -X POST https://monitoring.airlinebooking.com/api/deployments \
            -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "production",
              "version": "${{ github.sha }}",
              "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"
            }'

      - name: 📢 Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\n*Environment:* Production\n*Version:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📢 Notify on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Failed*\n*Environment:* Production\n*Version:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Link:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
