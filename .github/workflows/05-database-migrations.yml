name: 🔄 Database Migrations

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      migration_name:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      migration_name:
        description: 'Migration to run (leave empty to run all)'
        required: false
        type: string

jobs:
  validate-migrations:
    name: ✅ Validate Migrations
    runs-on: ubuntu-latest
    outputs:
      migration-count: ${{ steps.validate.outputs.migration-count }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm ci

      - name: ✅ Validate migration files
        id: validate
        run: |
          cd backend
          MIGRATION_COUNT=$(find src/migrations -name "*.ts" | wc -l)
          echo "migration-count=${MIGRATION_COUNT}" >> $GITHUB_OUTPUT
          
          echo "Found ${MIGRATION_COUNT} migration files"
          npm run typeorm -- migration:show

      - name: 🔍 Check for migration conflicts
        run: |
          cd backend
          npm run typeorm -- migration:show | grep -i "pending" || echo "No pending migrations"

  backup-database:
    name: 💾 Backup Database
    runs-on: ubuntu-latest
    needs: validate-migrations
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID_{0}', inputs.environment || 'STAGING')] }}
          aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY_{0}', inputs.environment || 'STAGING')] }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 📦 Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: 💾 Create database backup
        env:
          DB_HOST: ${{ secrets[format('DB_HOST_{0}', inputs.environment || 'STAGING')] }}
          DB_USER: ${{ secrets[format('DB_USER_{0}', inputs.environment || 'STAGING')] }}
          DB_NAME: ${{ secrets[format('DB_NAME_{0}', inputs.environment || 'STAGING')] }}
          DB_PASSWORD: ${{ secrets[format('DB_PASSWORD_{0}', inputs.environment || 'STAGING')] }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backup_${TIMESTAMP}.sql.gz"
          
          PGPASSWORD=$DB_PASSWORD pg_dump -h $DB_HOST -U $DB_USER $DB_NAME | gzip > $BACKUP_FILE
          
          echo "Uploading backup to S3..."
          aws s3 cp $BACKUP_FILE s3://${{ secrets.AWS_BACKUP_BUCKET }}/database/${{ inputs.environment || 'staging' }}/$BACKUP_FILE
          
          echo "::set-output name=backup-file::$BACKUP_FILE"
          echo "Backup completed: $BACKUP_FILE"

      - name: 📝 Log backup to DynamoDB
        run: |
          aws dynamodb put-item \
            --table-name database-backups \
            --item '{
              "environment": {"S": "${{ inputs.environment || 'staging' }}"},
              "timestamp": {"S": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"},
              "backup_file": {"S": "backup_'$(date +%Y%m%d_%H%M%S)'.sql.gz"},
              "status": {"S": "completed"}
            }'

  run-migrations:
    name: 🚀 Run Migrations
    runs-on: ubuntu-latest
    needs: [validate-migrations, backup-database]
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm ci

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID_{0}', inputs.environment || 'STAGING')] }}
          aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY_{0}', inputs.environment || 'STAGING')] }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔐 Retrieve database secrets
        id: secrets
        run: |
          cd backend
          DATABASE_URL=$(aws secretsmanager get-secret-value --secret-id ${{ inputs.environment || 'staging' }}/database-url --query SecretString --output text)
          echo "::add-mask::$DATABASE_URL"
          echo "database-url=$DATABASE_URL" >> $GITHUB_OUTPUT

      - name: 🚀 Run migrations
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.database-url }}
        run: |
          cd backend
          if [ -z "${{ inputs.migration_name }}" ]; then
            echo "Running all pending migrations..."
            npm run typeorm -- migration:run
          else
            echo "Running specific migration: ${{ inputs.migration_name }}"
            npm run typeorm -- migration:run -m ${{ inputs.migration_name }}
          fi

      - name: ✅ Verify migrations
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.database-url }}
        run: |
          cd backend
          npm run typeorm -- migration:show

      - name: 📢 Notify migration success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ Database migration successful",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Database Migration Successful* ✅\nEnvironment: ${{ inputs.environment || 'staging' }}\nMigrations run: ${{ needs.validate-migrations.outputs.migration-count }}"
                }
              }]
            }'

  verify-data-integrity:
    name: 🔍 Verify Data Integrity
    runs-on: ubuntu-latest
    needs: run-migrations
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm ci

      - name: 🔧 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets[format('AWS_ACCESS_KEY_ID_{0}', inputs.environment || 'STAGING')] }}
          aws-secret-access-key: ${{ secrets[format('AWS_SECRET_ACCESS_KEY_{0}', inputs.environment || 'STAGING')] }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔍 Run integrity checks
        env:
          DATABASE_URL: ${{ secrets[format('DATABASE_URL_{0}', inputs.environment || 'STAGING')] }}
        run: |
          cd backend
          npm run db:verify-integrity

  migration-summary:
    name: 📊 Migration Summary
    runs-on: ubuntu-latest
    needs: [validate-migrations, backup-database, run-migrations, verify-data-integrity]
    if: always()
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🔄 Database Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Migrations Validated:** ${{ needs.validate-migrations.outputs.migration-count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backup Status:** ${{ needs.backup-database.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Migration Status:** ${{ needs.run-migrations.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Verification Status:** ${{ needs.verify-data-integrity.result }}" >> $GITHUB_STEP_SUMMARY
