name: 🔄 Scheduled Tasks
on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC daily
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────────────────────
  # BACKUP DATABASE
  # ─────────────────────────────────────────────────────────────
  backup-database:
    name: 💾 Backup Database
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 💾 Create RDS Snapshot
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier airline-booking-db \
            --db-snapshot-identifier airline-booking-db-$(date +%Y%m%d-%H%M%S)

      - name: 📤 Upload to S3
        run: |
          # Backup logic here
          echo "Database backup completed"

  # ─────────────────────────────────────────────────────────────
  # CLEANUP OLD ARTIFACTS
  # ─────────────────────────────────────────────────────────────
  cleanup-artifacts:
    name: 🧹 Cleanup Old Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: 🗑️ Remove old Docker images
        run: |
          gh extension install actions/gh-actions-cache
          REPO=${{ github.repository }}
          
          # Delete cache entries older than 7 days
          gh actions-cache delete-all \
            --repo ${{ github.repository }} \
            --max-age 7

  # ─────────────────────────────────────────────────────────────
  # UPDATE DEPENDENCIES
  # ─────────────────────────────────────────────────────────────
  update-dependencies:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Check for Updates (Backend)
        run: |
          cd backend
          mvn versions:display-dependency-updates || true

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Check for Updates (Frontend)
        run: |
          cd frontend
          npm outdated || true

  # ─────────────────────────────────────────────────────────────
  # HEALTH CHECK
  # ─────────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Production Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Check Backend Health
        run: |
          for i in {1..3}; do
            if curl -f https://api.airlinebooking.com/api/v1/health; then
              echo "✓ Backend is healthy"
              exit 0
            fi
            echo "Attempt $i/3 failed, retrying..."
            sleep 10
          done
          exit 1

      - name: 🔍 Check Frontend Health
        run: |
          if curl -f https://airlinebooking.com; then
            echo "✓ Frontend is healthy"
          else
            echo "✗ Frontend is down"
            exit 1
          fi

      - name: 📊 Check Database
        run: |
          # Check database health via API
          curl -f https://api.airlinebooking.com/api/v1/metrics || true

      - name: 📢 Alert on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Health Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Health Check Failed*\n*Time:* ${{ job.started_at }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
