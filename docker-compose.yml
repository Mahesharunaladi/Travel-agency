version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: airline-booking-db
    environment:
      POSTGRES_DB: airline_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # CACHE
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: airline-booking-cache
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # BACKEND (JAVA/SPRING BOOT)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airline-booking-backend
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: airline_booking
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      # Server
      PORT: 3001
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airline-booking
    volumes:
      - ./backend:/app
      - /app/target

  # ─────────────────────────────────────────────────────────────
  # FRONTEND (NEXT.JS)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airline-booking-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - airline-booking
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules

  # ─────────────────────────────────────────────────────────────
  # MONITORING - PROMETHEUS
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: airline-booking-prometheus
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # MONITORING - GRAFANA
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: airline-booking-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # LOGGING - ELASTICSEARCH
  # ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: airline-booking-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # LOGGING - KIBANA
  # ─────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: airline-booking-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - airline-booking

  # ─────────────────────────────────────────────────────────────
  # LOGGING - LOGSTASH
  # ─────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: airline-booking-logstash
    volumes:
      - ./infrastructure/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - airline-booking

networks:
  airline-booking:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
